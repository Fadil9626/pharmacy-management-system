services:
  postgres:
    image: postgres:15-alpine
    container_name: pharmacy_db
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: pharmacy_user
      POSTGRES_PASSWORD: pharmacy_pass
    ports:
      - "127.0.0.1:5437:5432"
    volumes:
      - pharmacy_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmacy_user -d pharmacy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pharmacy_pg_data:
